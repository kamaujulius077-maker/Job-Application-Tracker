<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerPulse | Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">Career<span>Pulse</span></div>
        <div class="nav-links">
            <a href="index.html"
            class="active">Dashboard</a>
            <a href="about.html">About App</a>
        </div>
    </nav>
<div class="container">
    <!-- Dashboard Header & Stats -->
     <header class="dashboard-header">
        <div>
             <h1>Welcome Back</h1>
            <p>You have <span id="app-count"> 0 </span>active applications.</p>
        </div>
        <div class="stat-card"><small>Success Rate</small>
            <div class="progress-bar"><div
            id="progress-fill"></div>
        </div>
    </header>

    <!-- Input Section -->
     <section class="card">
        <form id="job-form" class="grid-form">
            <input type="text" id="company" placeholder="Company Name" required>
            <input type="text" id="role" placeholder="Job Title" required>
            <select id="status">
                <option value="Interested"> Applied</option>
                <option value="Interview"> Interview</option>
                <option value="Offer"> Offer</option>
                </select>
                <button type="submit" class="btn-primary">Add Application</button>
        </form>
     </section>

     <!-- Table Section-->
      <section class="card table-card">
        <table id="job-table">
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Position</th>
                    <th>Status</th>
                    <th style="text-align:right">Management</th>
                </tr>
            </thead>
            <tbody id="job-body">
                <!-- JS Injected Rows -->
            </tbody>
        </table>
      </section>
      </div>
      <script src="script.js"></script>
      </body>
      </html>
