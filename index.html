<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Job Application Tracker - Track and manage your job applications efficiently">

        </div>

    <!-- Navigation menu -->
    <nav class="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Dashboard</a></li>
