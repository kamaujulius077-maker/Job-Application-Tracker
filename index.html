<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
</head>
<body>
    <div class="container">
        <h1>Job Application Tracker</h1>

        <!-- Stats -->
         <div class="stats">
            <div class="stat">Total Applications: <span id="total-count">0</span></div>
            <div class="stat">Interviews Scheduled: <span id="interviews-count">0</span>
            <div class="stat">Offers Received: <span id="offers-count">0</span></div>
          </div>

          <!--Add Apllicaton Form -->
          <h2>Add New Application</h2>
            <form id="application-form">
                <div class="form">
                    <input type="text" id="company" placeholder="Company Name" required>
                    <input type="text" id="role" placeholder="Role" required>
                 </div>
                 <div class="form-group">
                    <input type="url" id="link" placeholder="Job link">
                    <input type="number" id="salary" placeholder="Salary KES">
                </div>
                <div class="form-group">
                    <input type="date" id="date-applied" required>
                    <select id="status" required>
                        <option value="">Select Status</option>
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Offer">Offer</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                    <button type="submit">Add Application</button>
                </div>
</body>
</html>
