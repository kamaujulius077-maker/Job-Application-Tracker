<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Job Application Tracker - Track and manage your job applications efficiently">
    <meta name="author" content="Job Application Tracker">
    <title>Job Application Tracker - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header with navigation -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">📊 Job Tracker</h1>
                <p class="tagline">Manage Your Job Applications</p>
            </div>
        </div>
    </header>

    <!-- Navigation menu -->
    <nav class="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Dashboard</a></li>
                <li><a href="application.html" class="nav-link">Add Application</a></li>
                <li><a href="statistics.html" class="nav-link">Statistics</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- Main content -->
    <main class="main-content">
        <div class="container">
            <!-- Dashboard section -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h2>Your Applications</h2>
                    <div class="filter-controls">
                        <label for="status-filter">Filter by Status:</label>
                        <select id="status-filter" class="filter-select">
                            <option value="all">All</option>
                            <option value="Applied">Applied</option>
                            <option value="Interviewed">Interviewed</option>
                            <option value="Offered">Offered</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                </div>
                <!-- Applications table -->
                <section class="applications-container">
                    <div id="empty-state" class="empty-state">
                        <p>No job applications yet. <a href="application.html">Add your first application</a></p>
                    </div>
                    <table id="applications-table" class="applications-table hidden">
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Position</th>
                                <th>Date Applied</th>
                                <th>Status</th>
                                <th>Notes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="applications-body">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </section>
                </section>
                </div>
                </main>
                
                <!-- Footer -->
                <footer class="footer">
                    <div class="container">
                        <p>&copy; 2026 Job Application Tracker. Track your applications, land your dream job!</p>
                    </div>
                </footer>
                
                <script src="script.js"></script>
                </body>
                
                </html>
